<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Image Tracker</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #ar-container { position: fixed; inset: 0; }
  #start-screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 30% 20%, #1a1a2e 0%, #0f0f1e 100%);
    color: #fff; padding: 2rem; text-align: center;
  }
  #start-screen h1 {
    font-size: 1.75rem; margin: 0 0 0.5rem;
    font-weight: 500; letter-spacing: -0.01em;
  }
  #start-screen p {
    max-width: 28rem; color: #a0a0b0; margin: 0 0 2rem; line-height: 1.5;
  }
  #start-btn {
    padding: 0.85rem 2.5rem; background: #fff; color: #0f0f1e;
    border: none; border-radius: 999px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: transform 0.15s ease;
  }
  #start-btn:active { transform: scale(0.97); }
  #start-btn:disabled { opacity: 0.5; cursor: wait; }
  #stop-btn {
    position: fixed; top: 1rem; right: 1rem; z-index: 20;
    background: rgba(0, 0, 0, 0.55); color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 999px; padding: 0.5rem 1rem;
    font-size: 0.875rem; cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
  }
  #err {
    max-width: 28rem; margin-top: 1.5rem;
    padding: 0.75rem 1rem;
    background: #2a1a1a; color: #ff9a9a;
    border: 1px solid #552222; border-radius: 0.5rem;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.8rem; text-align: left; white-space: pre-wrap;
    display: none;
  }
  .hidden { display: none !important; }
</style>

<!-- Import map: Three, Three addons, AND MindAR all load as ES modules. -->
<script type="importmap">
{
  "imports": {
    "three":              "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":      "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>

<div id="start-screen">
  <h1>Augmented Reality</h1>
  <p>Tap start and allow camera access, then point your camera at the target image.</p>
  <button id="start-btn">Start AR</button>
  <pre id="err"></pre>
</div>

<button id="stop-btn">Exit</button>
<div id="ar-container"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

const startBtn    = document.getElementById('start-btn');
const stopBtn     = document.getElementById('stop-btn');
const startScreen = document.getElementById('start-screen');
const errBox      = document.getElementById('err');

// Surface any error on-screen so we don't debug blind on mobile.
function showError(e) {
  console.error(e);
  errBox.style.display = 'block';
  errBox.textContent = (e && (e.stack || e.message)) || String(e);
}
window.addEventListener('error',              (e) => showError(e.error || e.message));
window.addEventListener('unhandledrejection', (e) => showError(e.reason));

let mindarThree = null;
let mixer = null;
const clock = new THREE.Clock();

async function startAR() {
  try {
    startBtn.disabled = true;
    errBox.style.display = 'none';

    mindarThree = new MindARThree({
      container: document.querySelector('#ar-container'),
      imageTargetSrc: './targets.mind',
    });

    const { renderer, scene, camera } = mindarThree;

    // --- Renderer tuning for physically-based glTF look ---
    renderer.shadowMap.enabled   = true;
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace    = THREE.SRGBColorSpace;
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    // Anchor to image target #0 (the first image in your .mind file)
    const anchor = mindarThree.addAnchor(0);

    // --- Lighting ---
    // Soft fill so the shadowed side of the model isn't pitch black.
    const hemi = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 1.0);
    scene.add(hemi);

    // Key light — casts the shadow onto the image.
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
    keyLight.position.set(0.5, 1.2, 1.5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    const r = 1.2;
    keyLight.shadow.camera.left   = -r;
    keyLight.shadow.camera.right  =  r;
    keyLight.shadow.camera.top    =  r;
    keyLight.shadow.camera.bottom = -r;
    keyLight.shadow.camera.near   = 0.1;
    keyLight.shadow.camera.far    = 6;
    keyLight.shadow.bias          = -0.0005;
    keyLight.shadow.radius        = 3;
    anchor.group.add(keyLight);
    anchor.group.add(keyLight.target);

    // --- Invisible shadow-catcher ---
    // MindAR anchor coords: image lies in the XY plane, +Z points toward the viewer.
    // PlaneGeometry's default normal is +Z, so no rotation needed.
    const shadowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(2, 2),
      new THREE.ShadowMaterial({ opacity: 0.45 })
    );
    shadowPlane.receiveShadow = true;
    anchor.group.add(shadowPlane);

    // --- Load the animated glTF ---
    const loader = new GLTFLoader();
    loader.load(
      './model.glb',
      (gltf) => {
        const model = gltf.scene;

        // Most glTFs are +Y up; MindAR anchors use +Z up. Rotate to stand upright.
        model.rotation.x = Math.PI / 2;

        // Scale (1.0 = model width matches image width). Tweak to taste.
        model.scale.setScalar(0.5);

        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow    = true;
            obj.receiveShadow = true;
          }
        });

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach((clip) => mixer.clipAction(clip).play());
        }

        anchor.group.add(model);
      },
      undefined,
      (err) => showError(err)
    );

    await mindarThree.start();
    renderer.setAnimationLoop(() => {
      if (mixer) mixer.update(clock.getDelta());
      renderer.render(scene, camera);
    });

    startScreen.classList.add('hidden');
    stopBtn.style.display = 'block';
  } catch (e) {
    showError(e);
    startBtn.disabled = false;
  }
}

async function stopAR() {
  try {
    if (mindarThree) {
      mindarThree.renderer.setAnimationLoop(null);
      await mindarThree.stop();
      mindarThree.renderer.dispose();
      mindarThree = null;
      mixer = null;
    }
  } catch (e) {
    showError(e);
  }
  startScreen.classList.remove('hidden');
  stopBtn.style.display = 'none';
  startBtn.disabled = false;
}

startBtn.addEventListener('click', startAR);
stopBtn.addEventListener('click', stopAR);
</script>
</body>
</html>

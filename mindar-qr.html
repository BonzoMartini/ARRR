<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    color: #e8e8f0;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 0 60px rgba(0,255,224,0.15);
  }

  .label {
    color: #000;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }

  .url {
    color: #555;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-align: center;
    max-width: 220px;
    word-break: break-all;
    line-height: 1.6;
  }

  .hint {
    position: fixed;
    bottom: 30px;
    color: #4a4a6a;
    font-size: 11px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="label">✦ Scan for AR Experience</div>
  <div id="qr"></div>
  <div class="url">bonzomartini.github.io/ARRR/mindar.html</div>
</div>

<div class="hint">Screenshot or print this page</div>

<script>
  new QRCode(document.getElementById('qr'), {
    text: 'https://bonzomartini.github.io/ARRR/mindar.html',
    width: 220,
    height: 220,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
